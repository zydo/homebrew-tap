name: Formula tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  HOMEBREW_NO_ENV_HINTS: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Build every formula in the tap from source on clean macOS and Linux runners,
# run its `test do` block (for alle: smokes `alle version`, the bundled Web UI
# assets, and the absence of every GUI/tray surface), and hold the tap to
# `brew audit --strict`.
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # GitHub's macOS runners preinstall aws/tap; Homebrew's tap-trust check
      # then warns on every brew command. Untap it (the fix the warning names).
      - name: Drop preinstalled untrusted taps
        if: runner.os == 'macOS'
        run: brew untap aws/tap || true

      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor, which
      # breaks Homebrew's bubblewrap sandbox probe (it then warns on every build
      # and post-install). Re-enable them so the sandbox actually works.
      - name: Allow unprivileged user namespaces (bubblewrap sandbox)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Put Linuxbrew on PATH
        if: runner.os == 'Linux'
        run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      # Inside bwrap's user namespace only the runner's own uid/gid are mapped,
      # and Homebrew's Mktemp chowns its staging directory to the brew file's
      # group — EINVAL for any unmapped gid, which Mktemp does not rescue
      # (Errno::EPERM only). Give the brew file the runner's primary group so
      # that chown targets the one mapped gid and sandboxed builds succeed.
      - name: Align brew's group with the runner user
        if: runner.os == 'Linux'
        run: |
          brew_file="$(readlink -f /home/linuxbrew/.linuxbrew/bin/brew)"
          stat -c "before: %U:%G (%u:%g) $brew_file" "$brew_file"
          sudo chgrp "$(id -g)" "$brew_file"
          stat -c "after:  %U:%G (%u:%g) $brew_file" "$brew_file"

      - name: Expose this checkout as the tap
        run: |
          tap_dir="$(brew --repository)/Library/Taps/zydo/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - name: Build every formula from source
        run: |
          for formula in Formula/*.rb; do
            name="$(basename "$formula" .rb)"
            brew install --build-from-source --verbose "zydo/tap/$name"
          done

      - name: CLI startup smoke (alle)
        run: |
          "$(brew --prefix)/bin/alle" version
          "$(brew --prefix)/bin/alle" --help >/dev/null

      - name: Run every formula's test block
        run: |
          for formula in Formula/*.rb; do
            name="$(basename "$formula" .rb)"
            brew test "zydo/tap/$name"
          done

      - name: Audit
        run: |
          for formula in Formula/*.rb; do
            name="$(basename "$formula" .rb)"
            brew audit --strict "zydo/tap/$name"
          done
